<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350">
  <!-- outer circle -->
  <circle cx="175" cy="175" r="140" fill="none" stroke="#ffffff" stroke-width="14" />

  <!-- globe grid -->
  <g fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round">
    <!-- equator -->
    <line x1="35" y1="175" x2="315" y2="175" />
    <!-- latitude lines -->
    <line x1="62" y1="110" x2="288" y2="110" />
    <line x1="62" y1="240" x2="288" y2="240" />
    <!-- meridians -->
    <ellipse cx="175" cy="175" rx="50" ry="130" />
    <ellipse cx="175" cy="175" rx="100" ry="130" />
    <!-- center vertical -->
    <line x1="175" y1="45" x2="175" y2="305" />
  </g>
</svg>
