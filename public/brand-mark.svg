<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 350">
  <defs>
    <linearGradient id="emblem-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0eeeb" />
      <stop offset="100%" stop-color="#dad4cc" />
    </linearGradient>
  </defs>

  <!-- outer diamond -->
  <polygon
    points="175,16 334,175 175,334 16,175"
    fill="none"
    stroke="url(#emblem-glow)"
    stroke-width="8"
    stroke-linejoin="miter"
  />

  <!-- second diamond ring -->
  <polygon
    points="175,52 298,175 175,298 52,175"
    fill="none"
    stroke="#e8e6e3"
    stroke-width="3"
    stroke-linejoin="miter"
  />

  <!-- inner diamond -->
  <polygon
    points="175,88 262,175 175,262 88,175"
    fill="none"
    stroke="#e8e6e3"
    stroke-width="1.5"
    stroke-linejoin="miter"
  />

  <!-- crosshair lines — full length, gapped at center -->
  <line x1="175" y1="28" x2="175" y2="130" stroke="#e8e6e3" stroke-width="2.5" />
  <line x1="175" y1="220" x2="175" y2="322" stroke="#e8e6e3" stroke-width="2.5" />
  <line x1="28" y1="175" x2="130" y2="175" stroke="#e8e6e3" stroke-width="2.5" />
  <line x1="220" y1="175" x2="322" y2="175" stroke="#e8e6e3" stroke-width="2.5" />

  <!-- diagonal crosshairs -->
  <line x1="70" y1="70" x2="120" y2="120" stroke="#e8e6e3" stroke-width="1.5" />
  <line x1="280" y1="70" x2="230" y2="120" stroke="#e8e6e3" stroke-width="1.5" />
  <line x1="70" y1="280" x2="120" y2="230" stroke="#e8e6e3" stroke-width="1.5" />
  <line x1="280" y1="280" x2="230" y2="230" stroke="#e8e6e3" stroke-width="1.5" />

  <!-- tick marks on crosshairs -->
  <line x1="170" y1="80" x2="180" y2="80" stroke="#e8e6e3" stroke-width="1.5" />
  <line x1="170" y1="270" x2="180" y2="270" stroke="#e8e6e3" stroke-width="1.5" />
  <line x1="80" y1="170" x2="80" y2="180" stroke="#e8e6e3" stroke-width="1.5" />
  <line x1="270" y1="170" x2="270" y2="180" stroke="#e8e6e3" stroke-width="1.5" />

  <!-- center targeting rings -->
  <circle cx="175" cy="175" r="38" fill="none" stroke="#e8e6e3" stroke-width="1.5" />
  <circle cx="175" cy="175" r="22" fill="none" stroke="#e8e6e3" stroke-width="2" />
  <circle cx="175" cy="175" r="6" fill="#e8e6e3" />

  <!-- small detail dots at cardinal points of outer ring -->
  <circle cx="175" cy="137" r="2.5" fill="#e8e6e3" />
  <circle cx="175" cy="213" r="2.5" fill="#e8e6e3" />
  <circle cx="137" cy="175" r="2.5" fill="#e8e6e3" />
  <circle cx="213" cy="175" r="2.5" fill="#e8e6e3" />
</svg>
